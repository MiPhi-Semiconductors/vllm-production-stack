apiVersion: production-stack.vllm.ai/v1alpha1
kind: VLLMRuntime
metadata:
  labels:
    app.kubernetes.io/name: production-stack
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/component: vllm-runtime
    model: Llama-3.2-1B-Instruct
  name: vllmruntime-sample-llama
spec:
  # Model configuration
  model:
    modelURL: "meta-llama/Llama-3.2-1B-Instruct"
    enableLoRA: true
    enableTool: false
    toolCallParser: ""
    maxModelLen: 4096
    dtype: "bfloat16"
    maxNumSeqs: 32
    # HuggingFace token secret (optional)
    hfTokenSecret:
      hfTokenSecretName: "huggingface-token"
      hfTokenKeyName: "token"

  # vLLM server configuration
  vllmConfig:
    # vLLM specific configurations
    enableChunkedPrefill: false
    enablePrefixCaching: false
    tensorParallelSize: 1
    gpuMemoryUtilization: "0.8"
    maxLoras: 4
    v1: true
    port: 8000
    # Environment variables
    env:
      - name: HF_HOME
        value: "/data"

  # LM Cache configuration
  lmCacheConfig:
    enabled: true
    cpuOffloadingBufferSize: "2"
    diskOffloadingBufferSize: "20"
    diskOffloadingPath: "file:///data/kv_offload"
    # remoteUrl: "lm://cacheserver-sample.default.svc.cluster.local:80"
    # remoteSerde: "naive"

  # Deployment configuration
  deploymentConfig:
    # Resource requirements
    resources:
      cpu: "5"
      memory: "32Gi"
      gpu: "1"
      gpuType: "nvidia.com/gpu"

    # Image configuration
    image:
      registry: "docker.io"
      name: "lmcache/vllm-openai:2025-05-27-v1"
      pullPolicy: "IfNotPresent"
      pullSecretName: ""

    # Number of replicas (ignored when keda.enabled is true)
    replicas: 2

    # KEDA autoscaling. When enabled, the operator creates a ScaledObject
    # targeting the runtime Deployment and stops managing Spec.Replicas.
    # The KEDA CRD must be installed in the cluster.
    keda:
      enabled: false
      minReplicaCount: 1
      maxReplicaCount: 5
      pollingInterval: 15
      cooldownPeriod: 300
      triggers:
        - type: prometheus
          metadata:
            serverAddress: "http://prometheus-operated.monitoring.svc:9090"
            metricName: vllm:num_requests_waiting
            threshold: "5"
            query: vllm:num_requests_waiting

    # Deployment strategy
    deploymentStrategy: "Recreate"

    # Sidecar configuration
    sidecarConfig:
      enabled: true
      name: "sidecar"
      image:
        registry: "docker.io"
        name: "lmcache/lmstack-sidecar:latest"
        pullPolicy: "Always"
      resources:
        cpu: "0.5"
        memory: "128Mi"
      mountPath: "/data"

  # Storage configuration
  storageConfig:
    enabled: true
    storageClassName: longhorn
    size: "512Gi"
    accessMode: "ReadWriteMany"
    mountPath: "/data"
    volumeName: "vllm-shared-storage"
