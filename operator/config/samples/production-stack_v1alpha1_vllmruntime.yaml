apiVersion: production-stack.vllm.ai/v1alpha1
kind: VLLMRuntime
metadata:
  labels:
    app.kubernetes.io/name: production-stack
    app.kubernetes.io/managed-by: kustomize
    model: Llama-3.2-1B-Instruct
  name: vllmruntime-sample
spec:
  # Model configuration
  model:
    modelURL: "/data/models/Llama-3.2-1B-Instruct"
    enableLoRA: false
    enableTool: false
    toolCallParser: ""
    maxModelLen: 1024
    dtype: "bfloat16"
    maxNumSeqs: 32
    # HuggingFace token secret (optional)
    # hfTokenSecret:
    #   name: "huggingface-token"
    # hfTokenName: "token"

  # vLLM server configuration
  vllmConfig:
    # vLLM specific configurations
    enableChunkedPrefill: false
    enablePrefixCaching: false
    tensorParallelSize: 1
    gpuMemoryUtilization: "0.9"
    maxLoras: 4
    extraArgs: ["--disable-log-requests"]
    v1: true
    port: 8000
    # Environment variables
    env:
      - name: HF_HOME
        value: "/data"

  # LM Cache configuration
  lmCacheConfig:
    enabled: true
    localDiskPath: "/data/offload_kv"
    diskOffloadingBufferSize: "5"
    chunkSize: "256"

  # Deployment configuration
  deploymentConfig:
    # Resource requirements
    resources:
      cpu: "5"
      memory: "32Gi"
      gpu: "1"

    # Image configuration
    image:
      registry: "docker.io"
      name: "lmcache/vllm-openai:build-latest"
      pullPolicy: "IfNotPresent"
      pullSecretName: ""

    # Number of replicas
    replicas: 2

    # Deployment strategy
    deploymentStrategy: "Recreate"

    # Sidecar configuration
    sidecarConfig:
      enabled: true
      name: "sidecar"
      image:
        registry: "docker.io"
        name: "lmcache/lmstack-sidecar:latest"
        pullPolicy: "Always"
      resources:
        cpu: "0.5"
        memory: "128Mi"
      mountPath: "/data"

    # volumeMounts:
    # - name: model_dir
    #   mountPath: "/usr/local/models"
    # - name: lmcache_offload
    #   mountPath: "/data"
    
    # volumes:
    # - name: model_dir
    #   hostPath:
    #     path: /usr/local/models
    #     type: Directory
    # - name: lmcache_offload
    #   hostPath:
    #     path: /mnt/nvme0/app_data/
    #     type: Directory


  # Storage configuration
  storageConfig:
    enabled: true
    storageClassName: standard

    size: "50Gi"
    accessMode: "ReadWriteMany"
    mountPath: "/data"
